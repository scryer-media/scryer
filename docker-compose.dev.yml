services:

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: scryer-nzbget
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    ports:
      - "6789:6789"
    volumes:
      - ./tmp/nzbget/config:/config
      - ./tmp/nzbget-downloads:/nzbget-downloads

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: scryer-sabnzbd
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      HOST_WHITELIST: localhost,sabnzbd,scryer-sabnzbd
    ports:
      - "8085:8080"
    volumes:
      - ./tmp/sabnzbd/config:/config
      - ./tmp/sabnzbd-downloads:/sabnzbd-downloads

  weaver:
    image: ghcr.io/scryer-media/weaver:latest
    container_name: scryer-weaver
    ports:
      - "9090:9090"
    volumes:
      - ./tmp/weaver/data:/data
      - ./tmp/weaver-downloads:/weaver-downloads

  scryer:
    build:
      context: .
      dockerfile: docker/scryer-dev-runtime.Dockerfile
    container_name: scryer
    working_dir: /workspace
    depends_on:
      - nzbget
    env_file:
      - crates/scryer/.env
    environment:
      SCRYER_BIND: 0.0.0.0:8080
      SCRYER_DB_PATH: "sqlite://file::memory:?mode=memory&cache=shared"
      SCRYER_WEB_UI_URL: http://nodejs:3000
      SCRYER_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://host.docker.internal:3000,http://nodejs:3000
      SCRYER_AUTH_ENABLED: "false"
      SCRYER_METADATA_GATEWAY_GRAPHQL_URL: https://smg.scryer.media/graphql
      SCRYER_NZBGET_URL: http://nzbget:6789/
      SCRYER_MOVIES_PATH: /media/movies
      SCRYER_SERIES_PATH: /media/series
      SCRYER_TITLE_IMAGE_AVIF_SPEED: "10"
      SCRYER_TITLE_IMAGE_AVIF_QUALITY: "60"
      SCRYER_SMG_REGISTRATION_SECRET: ${SCRYER_SMG_REGISTRATION_SECRET}
      RUST_LOG: "info,scryer_infrastructure::metadata_gateway=debug,extism=debug"
    command: >
      sh -c '
        set -eu
        cargo run --locked -p scryer
      '
    volumes:
      - .:/workspace
      - scryer-rust-target:/workspace/target
      - scryer-cargo-registry:/usr/local/cargo/registry
      - scryer-cargo-git:/usr/local/cargo/git
      - ./tmp/scryer-config:/config
      - ./tmp/scryer-data:/data
      - ./tmp/scryer-media:/media
      - ./tmp/nzbget-downloads:/nzbget-downloads
      - ./tmp/sabnzbd-downloads:/sabnzbd-downloads
      - ./tmp/weaver-downloads:/weaver-downloads
    ports:
      - "8080:8080"

  nodejs:
    image: node:25-alpine
    container_name: scryer-nodejs
    working_dir: /app
    volumes:
      - ./apps/scryer-web:/app
      - scryer-node_modules:/app/node_modules
    environment:
      SCRYER_GRAPHQL_URL: /graphql
      SCRYER_METADATA_GATEWAY_GRAPHQL_URL: https://smg.scryer.media/graphql
    command: >
      sh -c '
        set -eu

        lockfile="package-lock.json"
        deps_stamp="node_modules/.deps-lock-sha"
        current_hash="$$(sha256sum "$$lockfile" | cut -d" " -f1)"

        if [ ! -f "$$deps_stamp" ] || [ "$$current_hash" != "$$(cat "$$deps_stamp" 2>/dev/null || true)" ]; then
          npm ci --prefer-offline --no-audit --no-fund
          echo "$$current_hash" > "$$deps_stamp"
        fi

        npm run dev
      '
    # No host port — access through the proxy instead
    expose:
      - "3000"

  proxy:
    image: nginx:alpine
    container_name: scryer-proxy
    depends_on:
      - nodejs
      - scryer
    volumes:
      - ./docker/nginx-dev-proxy.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"

networks:
  default:
    name: scryer-dev

volumes:
  scryer-node_modules:
  scryer-rust-target:
  scryer-cargo-registry:
  scryer-cargo-git:
