services:

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: scryer-nzbget
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    ports:
      - "6789:6789"
    volumes:
      - ./tmp/nzbget/config:/config
      - ./tmp/nzbget-downloads:/nzbget-downloads

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: scryer-sabnzbd
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      HOST_WHITELIST: localhost,sabnzbd,scryer-sabnzbd
    ports:
      - "8085:8080"
    volumes:
      - ./tmp/sabnzbd/config:/config
      - ./tmp/sabnzbd-downloads:/sabnzbd-downloads

  weaver:
    image: ghcr.io/scryer-media/weaver:latest
    container_name: scryer-weaver
    environment:
      RUST_LOG: info
    ports:
      - "9090:9090"
    volumes:
      - ./tmp/weaver/data:/data
      - ./tmp/weaver-downloads:/weaver-downloads

  scryer:
    build:
      context: .
      dockerfile: docker/scryer-dev-runtime.Dockerfile
    container_name: scryer
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    working_dir: /workspace
    depends_on:
      - nzbget
      - sabnzbd
      - weaver
    env_file:
      - crates/scryer/.env
    environment:
      SCRYER_BIND: 0.0.0.0:8080
      SCRYER_METRICS: "true"
      SCRYER_WEB_UI_URL: http://nodejs:3000
      SCRYER_AUTH_ENABLED: "false"
      CARGO_TARGET_DIR: /cargo-target
      SCRYER_SMG_REGISTRATION_SECRET: ${SCRYER_SMG_REGISTRATION_SECRET}
    command: >
      sh -c '
        set -eu
        cargo run --locked -p scryer 
      '
    volumes:
      - .:/workspace
      - scryer-cargo-registry:/usr/local/cargo/registry
      - scryer-cargo-git:/usr/local/cargo/git
      - ./tmp/scryer-config:/config
      - ./tmp/scryer-media/movies:/data/movies
      - ./tmp/scryer-media/series:/data/series
      - /Volumes/Media/Anime:/data/anime:ro
      - ./tmp/nzbget-downloads:/nzbget-downloads
      - ./tmp/sabnzbd-downloads:/sabnzbd-downloads
      - ./tmp/weaver-downloads:/weaver-downloads
    ports:
      - "8080:8080"

  nodejs:
    image: node:25-alpine
    container_name: scryer-nodejs
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/scryer-web:/app
      - scryer-node_modules:/app/node_modules
    environment:
      SCRYER_GRAPHQL_URL: /graphql
    command: >
      sh -c '
        set -eu

        lockfile="package-lock.json"
        deps_stamp="node_modules/.deps-runtime-stamp"
        lock_hash="$$(sha256sum "$$lockfile" | cut -d" " -f1)"
        runtime_key="$$(node -e '"'"'const report = process.report?.getReport?.(); const libc = process.platform === "linux" ? (report?.header?.glibcVersionRuntime ? "gnu" : "musl") : "native"; process.stdout.write([process.version, process.platform, process.arch, libc].join(":"));'"'"')"
        expected_stamp="$$lock_hash:$$runtime_key"
        rolldown_check="import(\"rolldown\").then(() => process.exit(0)).catch(() => process.exit(1))"
        needs_install=0

        if [ ! -f "$$deps_stamp" ] || [ "$$expected_stamp" != "$$(cat "$$deps_stamp" 2>/dev/null || true)" ]; then
          needs_install=1
        elif ! node -e "$$rolldown_check"; then
          echo "Detected broken native frontend dependency install; rebuilding node_modules..."
          needs_install=1
        fi

        if [ "$$needs_install" = "1" ]; then
          rm -f "$$deps_stamp"
          npm ci --prefer-offline --no-audit --no-fund
          echo "$$expected_stamp" > "$$deps_stamp"
        fi

        npm run dev
      '
    # No host port — access through the proxy instead
    expose:
      - "3000"

  proxy:
    image: nginx:alpine
    container_name: scryer-proxy
    restart: unless-stopped
    depends_on:
      - nodejs
      - scryer
    volumes:
      - ./docker/nginx-dev-proxy.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: scryer-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - scryer-prometheus-data:/prometheus
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    container_name: scryer-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - scryer-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

  seed:
    image: alpine:latest
    container_name: scryer-seed
    depends_on:
      - scryer
    volumes:
      - ./scripts/docker/dev-seed.sh:/seed.sh:ro
      - ./dev-seed.json:/seed.json:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl jq >/dev/null 2>&1 && sh /seed.sh /seed.json"]
    environment:
      SCRYER_URL: http://scryer:8080
    restart: "no"
    profiles: ["seed"]

networks:
  default:
    name: scryer-dev

volumes:
  scryer-node_modules:
  scryer-cargo-registry:
  scryer-cargo-git:
  scryer-prometheus-data:
  scryer-grafana-data:
