services:

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: scryer-nzbget
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    ports:
      - "6789:6789"
    volumes:
      - ./tmp/nzbget/config:/config
      - ./tmp/nzbget-downloads:/nzbget-downloads

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: scryer-sabnzbd
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      HOST_WHITELIST: localhost,sabnzbd,scryer-sabnzbd
    ports:
      - "8085:8080"
    volumes:
      - ./tmp/sabnzbd/config:/config
      - ./tmp/sabnzbd-downloads:/sabnzbd-downloads

  weaver:
    image: ghcr.io/scryer-media/weaver:latest
    container_name: scryer-weaver
    ports:
      - "9090:9090"
    volumes:
      - ./tmp/weaver/data:/data
      - ./tmp/weaver-downloads:/weaver-downloads

  scryer:
    build:
      context: .
      dockerfile: docker/scryer-dev-runtime.Dockerfile
    container_name: scryer
    working_dir: /workspace
    depends_on:
      - nzbget
      - sabnzbd
      - weaver
    env_file:
      - crates/scryer/.env
    environment:
      SCRYER_BIND: 0.0.0.0:8080
      SCRYER_METRICS: "true"
      SCRYER_WEB_UI_URL: http://nodejs:3000
      SCRYER_AUTH_ENABLED: "false"
      SCRYER_MOVIES_PATH: /media/movies
      SCRYER_SERIES_PATH: /media/series
      SCRYER_SMG_REGISTRATION_SECRET: ${SCRYER_SMG_REGISTRATION_SECRET}
      SCRYER_DEV_SEED_FILE: ${SCRYER_DEV_SEED_FILE-./crates/scryer/dev-seed.toml}
      SCRYER_DEV_SEED_TITLES_FILE: ${SCRYER_DEV_SEED_TITLES_FILE-./crates/scryer/dev-seed-titles.toml}
      RUST_LOG: "info,scryer_infrastructure::metadata_gateway=debug,extism=debug"
    command: >
      sh -c '
        set -eu
        cargo run --locked -p scryer
      '
    volumes:
      - .:/workspace
      - scryer-rust-target:/workspace/target
      - scryer-cargo-registry:/usr/local/cargo/registry
      - scryer-cargo-git:/usr/local/cargo/git
      - ./tmp/scryer-config:/config
      - ./tmp/scryer-data:/data
      - ./tmp/scryer-media:/media
      - /Volumes/Media/Anime:/media/anime:ro
      - ./tmp/nzbget-downloads:/nzbget-downloads
      - ./tmp/sabnzbd-downloads:/sabnzbd-downloads
      - ./tmp/weaver-downloads:/weaver-downloads
    ports:
      - "8080:8080"

  nodejs:
    image: node:25-alpine
    container_name: scryer-nodejs
    working_dir: /app
    volumes:
      - ./apps/scryer-web:/app
      - scryer-node_modules:/app/node_modules
    environment:
      SCRYER_GRAPHQL_URL: /graphql
    command: >
      sh -c '
        set -eu

        lockfile="package-lock.json"
        deps_stamp="node_modules/.deps-lock-sha"
        current_hash="$$(sha256sum "$$lockfile" | cut -d" " -f1)"

        if [ ! -f "$$deps_stamp" ] || [ "$$current_hash" != "$$(cat "$$deps_stamp" 2>/dev/null || true)" ]; then
          npm ci --prefer-offline --no-audit --no-fund
          echo "$$current_hash" > "$$deps_stamp"
        fi

        npm run dev
      '
    # No host port — access through the proxy instead
    expose:
      - "3000"

  proxy:
    image: nginx:alpine
    container_name: scryer-proxy
    depends_on:
      - nodejs
      - scryer
    volumes:
      - ./docker/nginx-dev-proxy.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: scryer-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - scryer-prometheus-data:/prometheus
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    container_name: scryer-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - scryer-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

networks:
  default:
    name: scryer-dev

volumes:
  scryer-node_modules:
  scryer-rust-target:
  scryer-cargo-registry:
  scryer-cargo-git:
  scryer-prometheus-data:
  scryer-grafana-data:
