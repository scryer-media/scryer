services:
  scryer:
    image: ghcr.io/scryer-media/scryer:latest
    container_name: scryer
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - scryer-data:/data
      - /path/to/your/movies:/media/movies
      - /path/to/your/series:/media/series
    environment:
      # ── Default credentials ───────────────────────────────────────
      # On first run, an admin user is created automatically:
      #   username: admin
      #   password: admin
      # Change the password in the web UI after first login.

      # ── Encryption key ────────────────────────────────────────────
      # Encrypts passwords and API keys stored in the database.
      # Generate one before first run:
      #   docker run --rm ghcr.io/scryer-media/scryer --generate-key
      # SCRYER_ENCRYPTION_KEY: <paste generated key here>

      # ── Media paths (must match your volume mounts above) ─────────
      SCRYER_MOVIES_PATH: /media/movies
      SCRYER_SERIES_PATH: /media/series

      # ── Download client ───────────────────────────────────────────
      # SCRYER_NZBGET_URL: http://nzbget:6789
      # SCRYER_NZBGET_USERNAME: nzbget
      # SCRYER_NZBGET_PASSWORD: your-password

      # ── Metadata gateway ──────────────────────────────────────────
      # SCRYER_METADATA_GATEWAY_GRAPHQL_URL: https://smg.scryer.media/graphql

    # ── Upgrade procedure ───────────────────────────────────────────
    # 1. docker compose pull
    # 2. docker compose up -d
    #
    # Migrations run automatically. The scryer-data volume preserves
    # your database, encryption key (if not set above), and all settings.

volumes:
  scryer-data:
