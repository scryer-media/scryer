name: scryer

on:
  push:
    tags:
      - "scryer-v*"

concurrency:
  group: scryer-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: web
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: apps/scryer-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/scryer-web
        run: npm ci
      - name: Lint
        working-directory: apps/scryer-web
        run: npm run lint
      - name: Build web app
        working-directory: apps/scryer-web
        env:
          SCRYER_GRAPHQL_URL: /graphql
          SCRYER_METADATA_GATEWAY_GRAPHQL_URL: https://smg.scryer.media/graphql
        run: npm run build
      - name: Verify static output
        run: test -f apps/scryer-web/dist/index.html
      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: apps/scryer-web/dist
          if-no-files-found: error
          retention-days: 14

  rust-build:
    name: rust-build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends musl-tools mold nasm
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: true
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Build release binary (x86 musl + embedded UI)
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}/scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
          RUSTFLAGS: -C target-cpu=haswell
        run: mold -run cargo build -p scryer --release --locked --target x86_64-unknown-linux-musl
      - name: Package tarball
        run: tar -czf scryer-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-musl/release scryer
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: scryer-linux-x86_64-${{ github.run_id }}
          path: scryer-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-build-arm:
    name: rust-build-arm
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
      - name: Install target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Build release binary (arm64 musl + embedded UI)
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}/scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
          RUSTFLAGS: -C target-cpu=cortex-a72 --cfg aes_armv8 --cfg chacha20_force_neon
        run: mold -run cargo build -p scryer --release --locked --target aarch64-unknown-linux-musl
      - name: Package tarball
        run: tar -czf scryer-linux-arm64.tar.gz -C target/aarch64-unknown-linux-musl/release scryer
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: scryer-linux-arm64-${{ github.run_id }}
          path: scryer-linux-arm64.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-build-macos-arm:
    name: rust-build-macos-arm
    runs-on: macos-26
    timeout-minutes: 45
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Install system dependencies
        run: brew install nasm
      - name: Build release binary (macOS arm64)
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}/scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
          RUSTFLAGS: -C target-cpu=apple-m1 --cfg aes_armv8 --cfg chacha20_force_neon
        run: cargo build -p scryer --release --locked
      - name: Codesign binary
        env:
          CERT_P12: ${{ secrets.APPLE_SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASS="ci-ephemeral"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo -n "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          codesign --sign "Scryer Media Signing" --identifier media.scryer.app --force target/release/scryer
          codesign --verify --verbose target/release/scryer
          rm /tmp/cert.p12
          security delete-keychain "$KEYCHAIN"
      - name: Package tarball
        run: tar -czf scryer-darwin-arm64.tar.gz -C target/release scryer
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: scryer-darwin-arm64-${{ github.run_id }}
          path: scryer-darwin-arm64.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-build-macos-intel:
    name: rust-build-macos-intel
    runs-on: macos-26
    timeout-minutes: 45
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
          key: macos-intel
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Install system dependencies
        run: brew install nasm
      - name: Build release binary (macOS x86_64 cross-compile)
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}/scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
          RUSTFLAGS: -C target-cpu=haswell
        run: cargo build -p scryer --release --locked --target x86_64-apple-darwin
      - name: Codesign binary
        env:
          CERT_P12: ${{ secrets.APPLE_SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASS="ci-ephemeral"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo -n "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          codesign --sign "Scryer Media Signing" --identifier media.scryer.app --force target/x86_64-apple-darwin/release/scryer
          codesign --verify --verbose target/x86_64-apple-darwin/release/scryer
          rm /tmp/cert.p12
          security delete-keychain "$KEYCHAIN"
      - name: Package tarball
        run: tar -czf scryer-darwin-x86_64.tar.gz -C target/x86_64-apple-darwin/release scryer
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: scryer-darwin-x86_64-${{ github.run_id }}
          path: scryer-darwin-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-build-windows:
    name: rust-build-windows
    runs-on: windows-latest
    timeout-minutes: 45
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Install NASM
        shell: pwsh
        run: |
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/3.01/win64/nasm-3.01-win64.zip"
          Invoke-WebRequest $url -OutFile nasm.zip
          Expand-Archive nasm.zip -DestinationPath C:\nasm
          $dir = (Get-ChildItem C:\nasm -Directory | Select-Object -First 1).FullName
          echo "$dir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - name: Build release binary (Windows x86_64)
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}\scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
          RUSTFLAGS: -C target-cpu=haswell -C linker=rust-lld
        run: cargo build -p scryer --release --locked
      - name: Create README.txt
        shell: pwsh
        run: |
          @"
          scryer for Windows
          ==================

          Quick Start
          -----------
          1. Double-click scryer.exe (or run it from a terminal).
          2. Open http://localhost:8080 in your browser.

          Data is stored in %LOCALAPPDATA%\scryer by default. To use a
          different location, pass --data-dir:

              scryer.exe --data-dir C:\scryer-data

          Encryption Key
          --------------
          Scryer encrypts passwords and API keys stored in its database.
          On first run an encryption key is auto-generated and stored
          securely by Windows. No manual key management is needed.

          To override the key (advanced), set the environment variable
          SCRYER_ENCRYPTION_KEY before starting scryer.

          Running as a Windows Service (NSSM)
          ------------------------------------
          NSSM (https://nssm.cc) lets you run scryer as a background
          service that starts automatically with Windows.

          1. Download nssm and extract it somewhere on your PATH.
          2. Open an elevated (Administrator) terminal and run:

              nssm install scryer "C:\path\to\scryer.exe"
              nssm set scryer AppDirectory "C:\path\to"
              nssm set scryer AppParameters "--data-dir C:\scryer-data"
              nssm set scryer Start SERVICE_AUTO_START
              nssm start scryer

          To remove the service later:

              nssm stop scryer
              nssm remove scryer confirm

          Environment Variables
          ---------------------
          SCRYER_MOVIES_PATH      Movies directory
          SCRYER_SERIES_PATH      Series directory
          SCRYER_BIND             Listen address (default: 127.0.0.1:8080)
          SCRYER_OPEN_BROWSER     Set to "false" to disable auto-open
          SCRYER_DB_PATH          Override database path (advanced)
          "@ | Set-Content -Path README.txt -Encoding UTF8
      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path target\release\scryer.exe,README.txt -DestinationPath scryer-windows-x86_64.zip
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: scryer-windows-x86_64-${{ github.run_id }}
          path: scryer-windows-x86_64.zip
          if-no-files-found: error
          retention-days: 14

  rust-build-windows-arm:
    name: rust-build-windows-arm
    runs-on: windows-11-arm
    timeout-minutes: 45
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - name: Build release binary (Windows arm64)
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}\scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
          RUSTFLAGS: -C target-cpu=cortex-a76 -C linker=rust-lld
        run: cargo build -p scryer --release --locked
      - name: Create README.txt
        shell: pwsh
        run: |
          @"
          scryer for Windows
          ==================

          Quick Start
          -----------
          1. Double-click scryer.exe (or run it from a terminal).
          2. Open http://localhost:8080 in your browser.

          Data is stored in %LOCALAPPDATA%\scryer by default. To use a
          different location, pass --data-dir:

              scryer.exe --data-dir C:\scryer-data

          Encryption Key
          --------------
          Scryer encrypts passwords and API keys stored in its database.
          On first run an encryption key is auto-generated and stored
          securely by Windows. No manual key management is needed.

          To override the key (advanced), set the environment variable
          SCRYER_ENCRYPTION_KEY before starting scryer.

          Running as a Windows Service (NSSM)
          ------------------------------------
          NSSM (https://nssm.cc) lets you run scryer as a background
          service that starts automatically with Windows.

          1. Download nssm and extract it somewhere on your PATH.
          2. Open an elevated (Administrator) terminal and run:

              nssm install scryer "C:\path\to\scryer.exe"
              nssm set scryer AppDirectory "C:\path\to"
              nssm set scryer AppParameters "--data-dir C:\scryer-data"
              nssm set scryer Start SERVICE_AUTO_START
              nssm start scryer

          To remove the service later:

              nssm stop scryer
              nssm remove scryer confirm

          Environment Variables
          ---------------------
          SCRYER_MOVIES_PATH      Movies directory
          SCRYER_SERIES_PATH      Series directory
          SCRYER_BIND             Listen address (default: 127.0.0.1:8080)
          SCRYER_OPEN_BROWSER     Set to "false" to disable auto-open
          SCRYER_DB_PATH          Override database path (advanced)
          "@ | Set-Content -Path README.txt -Encoding UTF8
      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path target\release\scryer.exe,README.txt -DestinationPath scryer-windows-arm64.zip
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: scryer-windows-arm64-${{ github.run_id }}
          path: scryer-windows-arm64.zip
          if-no-files-found: error
          retention-days: 14

  rust-check:
    name: rust-check
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    needs: [web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94"
          components: clippy
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends musl-tools nasm
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: true
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-web-out-${{ github.run_id }}
          path: scryer-web-out
      - name: Run clippy
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}/scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
        run: cargo clippy --target x86_64-unknown-linux-musl --workspace -- -D warnings
      - name: Run workspace tests
        env:
          SCRYER_EMBED_UI_DIR: ${{ github.workspace }}/scryer-web-out
          SCRYER_SMG_REGISTRATION_SECRET: ${{ secrets.SMG_REGISTRATION_SECRET }}
          SCRYER_SMG_GRAPHQL_URL: https://smg.scryer.media/graphql
        run: cargo nextest run --target x86_64-unknown-linux-musl --workspace --locked

  docker-publish:
    name: docker-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [rust-build, rust-build-arm, rust-check]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-linux-x86_64-${{ github.run_id }}
          path: artifacts
      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: scryer-linux-arm64-${{ github.run_id }}
          path: artifacts
      - name: Prepare build context
        run: |
          mkdir -p docker-ctx/amd64 docker-ctx/arm64
          tar -xzf artifacts/scryer-linux-x86_64.tar.gz -C docker-ctx/amd64
          tar -xzf artifacts/scryer-linux-arm64.tar.gz -C docker-ctx/arm64
          cp docker/entrypoint.sh docker-ctx/entrypoint.sh
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/scryer
          tags: |
            type=raw,value=latest
            type=sha
            type=match,pattern=scryer-v(.*),group=1
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker/scryer.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: publish-release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [rust-build, rust-build-arm, rust-build-macos-arm, rust-build-macos-intel, rust-build-windows, rust-build-windows-arm, rust-check]
    permissions:
      contents: write
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'scryer-v') }}
    steps:
      - name: Resolve release tag
        id: release_meta
        run: |
          RELEASE_TAG="${{ github.ref_name }}"
          echo "tag_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: scryer-*-${{ github.run_id }}
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-artifacts
        run: shasum -a 256 scryer-*.tar.gz scryer-*.zip > scryer-checksums.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.tag_name }}
          files: |
            release-artifacts/scryer-*.tar.gz
            release-artifacts/scryer-*.zip
            release-artifacts/scryer-checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#scryer-v}"
          LINUX_X86_SHA=$(shasum -a 256 release-artifacts/scryer-linux-x86_64.tar.gz | cut -d ' ' -f1)
          LINUX_ARM_SHA=$(shasum -a 256 release-artifacts/scryer-linux-arm64.tar.gz | cut -d ' ' -f1)
          DARWIN_ARM_SHA=$(shasum -a 256 release-artifacts/scryer-darwin-arm64.tar.gz | cut -d ' ' -f1)
          DARWIN_X86_SHA=$(shasum -a 256 release-artifacts/scryer-darwin-x86_64.tar.gz | cut -d ' ' -f1)
          REPO="${{ github.repository }}"

          mkdir -p tap/Formula
          cat > tap/Formula/scryer.rb << FORMULA
          class Scryer < Formula
            desc "Self-hosted media acquisition and management platform"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/scryer-v${VERSION}/scryer-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM_SHA}"

                def install
                  bin.install "scryer"
                end
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/scryer-v${VERSION}/scryer-darwin-x86_64.tar.gz"
                sha256 "${DARWIN_X86_SHA}"

                def install
                  bin.install "scryer"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/scryer-v${VERSION}/scryer-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM_SHA}"

                def install
                  bin.install "scryer"
                end
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/scryer-v${VERSION}/scryer-linux-x86_64.tar.gz"
                sha256 "${LINUX_X86_SHA}"

                def install
                  bin.install "scryer"
                end
              end
            end

            service do
              run [opt_bin/"scryer", "--data-dir", var/"scryer"]
              keep_alive true
              log_path var/"log/scryer.log"
              error_log_path var/"log/scryer.log"
            end

            test do
              assert_match "scryer", shell_output("#{bin}/scryer --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' tap/Formula/scryer.rb

          git clone "https://${TAP_TOKEN}@github.com/scryer-media/homebrew-scryer.git" tap-repo
          mkdir -p tap-repo/Formula
          cp tap/Formula/scryer.rb tap-repo/Formula/scryer.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scryer.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
          else
            git commit -m "scryer ${VERSION}"
            git push origin HEAD:main
          fi
