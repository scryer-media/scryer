# Dev seed file -- copy to crates/scryer/dev-seed.toml and customize.
# Load via: SCRYER_DEV_SEED_FILE=./crates/scryer/dev-seed.toml
#
# All records are created idempotently through the application layer.
# Sensitive values (API keys, config_json) are encrypted at rest automatically.

[admin]
password = "admin"

[[indexers]]
name = "NZBGeek"
provider_type = "nzbgeek"
base_url = "https://api.nzbgeek.info"
api_key = "YOUR_API_KEY_HERE"
# rate_limit_seconds = 5
# rate_limit_burst = 3
# enabled = true

[[download_clients]]
name = "Home NZBGet"
client_type = "nzbget"
base_url = "http://127.0.0.1:6789/"
enabled = true

[download_clients.config]
host = "127.0.0.1"
port = "6789"
use_ssl = false
url_base = ""
username = "scryer"
password = ""
client_priority = "1"
remove_completed = false
remove_failed = false
client_type = "nzbget"

[[settings]]
scope = "media"
key = "movies.path"
value = "/media/movies"

[[settings]]
scope = "media"
key = "series.path"
value = "/media/series"

# Per-scope NZBGet client routing (one entry per media scope: movie, series, anime)
# [[settings]]
# scope = "system"
# key = "nzbget.client_routing"
